services:
  # ===== MySQL =====
  mysql:
    image: mysql:8.0.36
    container_name: weblog-mysql
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: weblog
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/sql/init:/docker-entrypoint-initdb.d:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=60
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --slow-query-log=1
      --log_output=FILE
      --slow-query-log-file=/var/lib/mysql/slow.log
      --long-query-time=2
      --performance-schema=ON
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.8"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ===== Redis =====
  redis:
    image: redis:7.2-alpine
    container_name: weblog-redis
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.3"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===== Backend API =====
  weblog-api:
    image: ghcr.io/1971697432/weblog/weblog-api:latest
    container_name: weblog-api
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "127.0.0.1:9091:9091"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CAPTCHA_SECRET_KEY=${CAPTCHA_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:}
      - HSTS_ENABLED=${HSTS_ENABLED:-true}
      - REFERER_ENABLED=${REFERER_ENABLED:-true}
      - OAUTH_ALLOWED_CALLBACKS=${OAUTH_ALLOWED_CALLBACKS:-yourdomain.com}
      - TRUSTED_PROXY_IPS=${TRUSTED_PROXY_IPS:-172.30.0.10}
      - IMPORT_TOKEN=${IMPORT_TOKEN}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - TZ=Asia/Shanghai
    volumes:
      - lucene-data:/data/lucene
      - app-logs:/var/log/weblog
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.8"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ===== User Frontend (SSR) =====
  weblog-user:
    image: ghcr.io/1971697432/weblog/weblog-user:latest
    container_name: weblog-user
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # API_BASE_URL 仅填写协议+域名(+端口)，不包含 /api
      - NUXT_PUBLIC_API_BASE=${API_BASE_URL:-http://weblog-api:9091}/api
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.4"
    depends_on:
      weblog-api:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===== Nginx Reverse Proxy =====
  nginx:
    image: nginx:alpine
    container_name: weblog-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./admin-static:/usr/share/nginx/html/admin:ro
      - nginx-logs:/var/log/nginx
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.3"
    depends_on:
      - weblog-api
      - weblog-user
    networks:
      frontend:
        ipv4_address: 172.30.0.10

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  lucene-data:
    driver: local
  app-logs:
    driver: local
  nginx-logs:
    driver: local

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
