user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ===== 日志格式 =====
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ===== 基础优化 =====
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 10m;
    server_tokens off;

    # ===== Gzip 压缩 =====
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ===== Brotli 压缩（优先级高于 Gzip） =====
    # brotli on;
    # brotli_vary on;
    # brotli_proxied any;
    # brotli_comp_level 4;
    # brotli_min_length 256;
    # brotli_types
    #     text/plain
    #     text/css
    #     text/xml
    #     text/javascript
    #     application/json
    #     application/javascript
    #     application/xml
    #     application/rss+xml
    #     image/svg+xml;

    # ===== IP 限流 =====
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=6r/m;
    limit_req_zone $binary_remote_addr zone=auth_code_limit:10m rate=6r/m;
    limit_req_zone $binary_remote_addr zone=forgot_limit:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=captcha_limit:10m rate=20r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ===== 轻量 WAF 规则（基于 URI/Query/UA）=====
    map $request_uri $waf_bad_uri {
        default 0;
        ~*(\.\./|/\.|/etc/passwd|/wp-admin|/phpmyadmin|/vendor/phpunit|/actuator/env|/actuator/heapdump) 1;
    }

    map $query_string $waf_bad_args {
        default 0;
        ~*(union(\s|%20)+select|select(\s|%20).*(from|into)|<script|%3Cscript|benchmark\(|sleep\(|load_file\() 1;
    }

    map $http_user_agent $waf_bad_ua {
        default 0;
        ~*(sqlmap|nikto|acunetix|nmap|masscan|zgrab|arachni|nessus) 1;
    }

    map "$waf_bad_uri$waf_bad_args$waf_bad_ua" $waf_block {
        default 0;
        ~1 1;
    }

    # ===== 上游服务 =====
    upstream backend_api {
        server weblog-api:9091;
        keepalive 32;
    }

    upstream user_ssr {
        server weblog-user:3000;
        keepalive 16;
    }

    # ===== HTTP → HTTPS 重定向 =====
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===== HTTPS 主站 =====
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # 每请求生成 CSP nonce（用于内联脚本/样式白名单）
        set $csp_nonce $request_id;

        # ===== SSL 配置 =====
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # ===== 安全响应头 =====
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'nonce-$csp_nonce'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-attr 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.github.com https://api.iconify.design blob:;" always;

        # 为 HTML 内联脚本/样式注入 nonce，配合 CSP 使用
        sub_filter_once off;
        sub_filter '<script' '<script nonce="$csp_nonce"';
        sub_filter '<style' '<style nonce="$csp_nonce"';

        # ===== 敏感文件保护 =====
        location ~ /\.(git|env|htaccess|htpasswd) {
            deny all;
            return 404;
        }

        location ~ \.(yml|yaml|properties|xml|conf|config|sql|bak|log)$ {
            deny all;
            return 404;
        }

        # ===== Lucene 索引保护 =====
        location /lucene {
            deny all;
            return 404;
        }

        # ===== API 反向代理 =====
        location = /api/captcha/generate {
            limit_req zone=captcha_limit burst=5 nodelay;

            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/captcha/verify {
            limit_req zone=captcha_limit burst=8 nodelay;

            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/captcha/refresh {
            limit_req zone=captcha_limit burst=5 nodelay;

            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/portal/auth/send-code {
            limit_req zone=auth_code_limit burst=3 nodelay;

            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/portal/auth/forgot-password {
            limit_req zone=forgot_limit burst=2 nodelay;

            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            if ($request_method !~ ^(GET|POST|PUT|DELETE|PATCH|OPTIONS)$) { return 405; }
            if ($waf_block = 1) { return 403; }

            limit_req zone=api_limit burst=10 nodelay;
            limit_conn conn_limit 12;

            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            proxy_send_timeout 15s;

            # 禁止缓存 API 响应
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ===== Nuxt Icon API 走用户端 SSR =====
        location ^~ /api/_nuxt_icon {
            proxy_pass http://user_ssr;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            proxy_send_timeout 15s;
        }

        # ===== 登录接口额外限流 =====
        location /api/admin/auth/login {
            limit_req zone=login_limit burst=3 nodelay;

            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/portal/auth/login {
            limit_req zone=login_limit burst=3 nodelay;

            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===== Actuator 保护（仅内网访问） =====
        location /actuator/ {
            deny all;
            return 404;
        }

        # ===== 管理端静态资源 (SPA) =====
        location /admin {
            alias /usr/share/nginx/html/admin;
            index index.html;
            try_files $uri $uri/ /admin/index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ===== 用户端 SSR 代理（根路径） =====
        location / {
            proxy_pass http://user_ssr;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
        }
    }
}
