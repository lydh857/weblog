name: P0 API Regression

on:
  schedule:
    - cron: '0 3 * * 1'
  # PR 触发已移除：该工作流在 PR 事件中可访问 secrets（P0_REGRESSION_AUTH_TOKEN）
  # 且执行来自 PR 分支的外部脚本（scripts/p0-api-regression.ps1 等），存在安全风险
  # 如需在 PR 中验证 API 回归，请使用 workflow_dispatch 手动触发
  # pull_request:
  #   branches:
  #     - master
  workflow_dispatch:
    inputs:
      authToken:
        description: 'Portal Satoken for authenticated checks (optional, can also use secret P0_REGRESSION_AUTH_TOKEN)'
        required: false
        default: ''
      requireAuthChecks:
        description: 'Fail when authenticated checks cannot be enabled'
        required: false
        type: boolean
        default: false
      checkMalformedCommentLike:
        description: 'Enable malformed comment like cache fallback check'
        required: false
        type: boolean
        default: false
      malformedCheckPostId:
        description: 'Post ID used by malformed cache check'
        required: false
        default: '1'
      malformedCheckCommentId:
        description: 'Comment ID used by malformed cache check'
        required: false
        default: '1'
      malformedExpectedLikeCount:
        description: 'Expected like count for malformed cache check'
        required: false
        default: '12'

jobs:
  p0-api-regression:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7.2
        ports:
          - 6380:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      SPRING_PROFILES_ACTIVE: dev
      DB_USERNAME: blog_user
      DB_PASSWORD: blog_pass
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6380
      REDIS_PASSWORD: ""
      JWT_SECRET: ci-jwt-secret-key-2026-at-least-32-characters
      CAPTCHA_SECRET_KEY: ci-captcha-secret-key-2026-at-least-32-characters
      BLOG_SECURITY_DEV_BYPASS_ENABLED: false
      GITHUB_CLIENT_ID: ci-github-client-id
      GITHUB_CLIENT_SECRET: ci-github-client-secret
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      SPRING_FLYWAY_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install mysql client
        run: sudo apt-get update && sudo apt-get install -y mysql-client redis-tools

      - name: Run security unit tests
        run: |
          mvn -f weblog-backend/pom.xml -pl weblog-api -am -Dtest=PageParamUtilSecurityTest -Dsurefire.failIfNoSpecifiedTests=false test
          mvn -f weblog-backend/pom.xml -pl weblog-infra-captcha -am -Dtest=TrackAnalyzerSecurityTest -Dsurefire.failIfNoSpecifiedTests=false test

      - name: Init MySQL schema
        run: |
          mysql -h127.0.0.1 -P3307 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS weblog CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql -h127.0.0.1 -P3307 -uroot -proot -e "CREATE USER IF NOT EXISTS 'blog_user'@'%' IDENTIFIED BY 'blog_pass';"
          mysql -h127.0.0.1 -P3307 -uroot -proot -e "GRANT ALL PRIVILEGES ON weblog.* TO 'blog_user'@'%'; FLUSH PRIVILEGES;"
          mysql -h127.0.0.1 -P3307 -uroot -proot weblog < database/sql/init/02-schema.sql
          mysql -h127.0.0.1 -P3307 -uroot -proot weblog < database/sql/init/03-data.sql

      - name: Build backend
        run: |
          mvn -f weblog-backend/pom.xml -pl weblog-api -am -Dmaven.test.skip=true package

      - name: Start backend
        run: |
          nohup java -jar weblog-backend/weblog-api/target/weblog-api-1.0.0-SNAPSHOT.jar > backend-ci.log 2>&1 &
          echo $! > backend-ci.pid

      - name: Wait for backend ready
        run: |
          for i in {1..120}; do
            if [ -f backend-ci.pid ] && ! kill -0 "$(cat backend-ci.pid)" 2>/dev/null; then
              echo "backend process exited unexpectedly"
              cat backend-ci.log || true
              exit 1
            fi
            if curl -sS "http://127.0.0.1:9091/api/search?keyword=test&pageNum=1&pageSize=1" >/dev/null; then
              echo "backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "backend not ready in time"
          cat backend-ci.log || true
          exit 1

      - name: Run P0 API regression script
        shell: pwsh
        env:
          INPUT_AUTH_TOKEN: ${{ inputs.authToken }}
          INPUT_REQUIRE_AUTH_CHECKS: ${{ inputs.requireAuthChecks }}
          SECRET_AUTH_TOKEN: ${{ secrets.P0_REGRESSION_AUTH_TOKEN }}
          INPUT_CHECK_MALFORMED_COMMENT_LIKE: ${{ inputs.checkMalformedCommentLike }}
          INPUT_MALFORMED_CHECK_POST_ID: ${{ inputs.malformedCheckPostId }}
          INPUT_MALFORMED_CHECK_COMMENT_ID: ${{ inputs.malformedCheckCommentId }}
          INPUT_MALFORMED_EXPECTED_LIKE_COUNT: ${{ inputs.malformedExpectedLikeCount }}
        run: |
          $authToken = ''
          $authTokenSource = ''
          $requireAuthChecks = $false
          if ($env:GITHUB_EVENT_NAME -eq 'pull_request' -or $env:GITHUB_EVENT_NAME -eq 'schedule') {
            $requireAuthChecks = $true
          } elseif ($env:INPUT_REQUIRE_AUTH_CHECKS -eq 'true' -or $env:INPUT_REQUIRE_AUTH_CHECKS -eq 'True') {
            $requireAuthChecks = $true
          }

          if (-not [string]::IsNullOrWhiteSpace($env:INPUT_AUTH_TOKEN)) {
            $authToken = $env:INPUT_AUTH_TOKEN
            $authTokenSource = 'workflow input'
          }

          if ([string]::IsNullOrWhiteSpace($authToken)) {
            try {
              $clientIp = '127.0.0.1'
              $captchaScene = 'login-code'
              $tokenId = [guid]::NewGuid().ToString()
              $createTime = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()

              $hmac = [System.Security.Cryptography.HMACSHA256]::new([Text.Encoding]::UTF8.GetBytes($env:CAPTCHA_SECRET_KEY))
              $payload = "$tokenId|$clientIp|$captchaScene|$createTime"
              $signatureBytes = $hmac.ComputeHash([Text.Encoding]::UTF8.GetBytes($payload))
              $signature = [Convert]::ToBase64String($signatureBytes).TrimEnd('=').Replace('+', '-').Replace('/', '_')
              $verifyToken = "$tokenId.$signature"

              $verifyTokenData = "{`"clientIp`":`"$clientIp`",`"scene`":`"$captchaScene`",`"createTime`":$createTime}"
              redis-cli -h 127.0.0.1 -p 6380 SETEX "captcha:verify:$tokenId" 120 "$verifyTokenData" | Out-Null
              if ($LASTEXITCODE -ne 0) {
                throw 'write verify token to redis failed'
              }

              $loginEmail = 'ci-regression@blog.test'
              $loginCode = '123456'
              $loginCodeKey = "blog:email:code:login:$loginEmail"
              redis-cli -h 127.0.0.1 -p 6380 SETEX "$loginCodeKey" 300 "$loginCode" | Out-Null
              if ($LASTEXITCODE -ne 0) {
                throw 'write login code to redis failed'
              }

              $loginBody = @{ email = $loginEmail; code = $loginCode } | ConvertTo-Json
              $loginHeaders = @{
                'X-Captcha-Token' = $verifyToken
                Origin = 'http://localhost:3000'
                Referer = 'http://localhost:3000/'
              }

              $loginResponse = Invoke-WebRequest -Method POST -Uri 'http://127.0.0.1:9091/api/portal/auth/login-by-code' -Headers $loginHeaders -Body $loginBody -ContentType 'application/json'
              foreach ($setCookie in @($loginResponse.Headers['Set-Cookie'])) {
                if ($null -ne $setCookie -and $setCookie -match 'Satoken=([^;]+)') {
                  $authToken = $matches[1]
                  break
                }
              }

              if ([string]::IsNullOrWhiteSpace($authToken)) {
                throw 'extract Satoken from login response failed'
              }

              $authTokenSource = 'generated in CI'
            } catch {
              Write-Host "[WARN] auto-generate auth token failed: $($_.Exception.Message)"
            }
          }

          if ([string]::IsNullOrWhiteSpace($authToken) -and -not [string]::IsNullOrWhiteSpace($env:SECRET_AUTH_TOKEN)) {
            $authToken = $env:SECRET_AUTH_TOKEN
            $authTokenSource = 'repository secret'
          }

          if ($requireAuthChecks -and [string]::IsNullOrWhiteSpace($authToken)) {
            throw 'RequireAuthChecks enabled but no auth token is available'
          }

          $scriptArgs = @{
            BaseUrl = 'http://127.0.0.1:9091'
            SummaryJsonPath = 'docs/p0-api-regression-result.json'
          }

          if ($requireAuthChecks) {
            $scriptArgs.RequireAuthChecks = $true
          }

          if (-not [string]::IsNullOrWhiteSpace($authToken)) {
            Write-Host "[INFO] authenticated checks token source: $authTokenSource"
            $scriptArgs.AuthToken = $authToken
          }

          $enableMalformedCheck = $env:INPUT_CHECK_MALFORMED_COMMENT_LIKE -eq 'true' -or $env:INPUT_CHECK_MALFORMED_COMMENT_LIKE -eq 'True'
          if ($enableMalformedCheck) {
            $scriptArgs.CheckMalformedCommentLike = $true
            $scriptArgs.MalformedCheckPostId = [long]$env:INPUT_MALFORMED_CHECK_POST_ID
            $scriptArgs.MalformedCheckCommentId = [long]$env:INPUT_MALFORMED_CHECK_COMMENT_ID
            $scriptArgs.MalformedExpectedLikeCount = [long]$env:INPUT_MALFORMED_EXPECTED_LIKE_COUNT
          }

          & ./scripts/p0-api-regression.ps1 @scriptArgs

      - name: Run captcha attack regression script
        shell: pwsh
        run: |
          & ./scripts/captcha-attack-regression.ps1 `
            -BaseUrl 'http://127.0.0.1:9091' `
            -SummaryJsonPath 'docs/captcha-attack-regression-result.json' `
            -ReportTextPath 'docs/captcha-attack-regression-report.txt' `
            -FailOnUnexpectedSuccess `
            -RequireBlacklistActivation

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-ci-log
          path: backend-ci.log

      - name: Upload regression summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: p0-api-regression-summary
          path: docs/p0-api-regression-result.json
          if-no-files-found: warn

      - name: Upload captcha attack summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: captcha-attack-regression-summary
          path: |
            docs/captcha-attack-regression-result.json
            docs/captcha-attack-regression-report.txt
            scripts/captcha-attack-report-template.json
          if-no-files-found: warn

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend-ci.pid ]; then
            kill $(cat backend-ci.pid) || true
          fi
