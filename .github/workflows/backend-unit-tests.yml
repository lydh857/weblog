name: Backend Unit Tests

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend unit tests
        run: mvn -f weblog-backend/pom.xml -pl weblog-api -am test -q
