name: Build & Deploy to Aliyun

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build Backend
        run: |
          cd weblog-backend
          mvn clean package -DskipTests -q

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Build User Frontend
        run: |
          cd weblog-user
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build Admin Frontend
        run: |
          cd weblog-admin
          pnpm install --frozen-lockfile
          pnpm build

      - name: Upload artifacts to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          overwrite: true
          source: |
            weblog-backend/
            weblog-user/
            weblog-admin/
            docker-compose.prod.yml
            nginx/
          target: /opt/weblog
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/weblog

            # 停止旧容器
            docker compose -f docker-compose.prod.yml down || true

            # 重命名 JAR 为 docker-compose.prod.yml 里的预期文件名
            JAR_FILE=$(ls weblog-backend/target/*.jar 2>/dev/null | head -1)
            if [ -n "$JAR_FILE" ] && [ -f "$JAR_FILE" ]; then
              cp "$JAR_FILE" ./weblog-api.jar
            fi

            # 启动容器
            docker compose -f docker-compose.prod.yml up -d

            # 健康检查
            sleep 20
            echo "===== 部署完成 ====="
