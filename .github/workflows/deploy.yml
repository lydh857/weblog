name: Build & Deploy to Aliyun

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build Backend JAR
        run: |
          cd weblog-backend
          mvn clean package -DskipTests -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend API image
        uses: docker/build-push-action@v5
        with:
          context: ./weblog-backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/weblog-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-user:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Build User Frontend
        run: |
          cd weblog-user
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push User Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./weblog-user
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/weblog-user:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-admin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Build Admin Frontend
        run: |
          cd weblog-admin
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Admin Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./weblog-admin
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/weblog-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  prepare-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create .env.prod
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.ENV_PROD_MYSQL_ROOT }}
          DB_USERNAME: ${{ secrets.ENV_PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.ENV_PROD_DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.ENV_PROD_REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.ENV_PROD_JWT_SECRET }}
          CAPTCHA_SECRET_KEY: ${{ secrets.ENV_PROD_CAPTCHA_SECRET_KEY }}
          CORS_ORIGINS: ${{ secrets.ENV_PROD_CORS_ORIGINS }}
          ALLOWED_ORIGINS: ${{ secrets.ENV_PROD_ALLOWED_ORIGINS }}
          API_BASE_URL: ${{ secrets.ENV_PROD_API_BASE_URL }}
          IMPORT_TOKEN: ${{ secrets.ENV_PROD_IMPORT_TOKEN }}
        run: |
          printf 'MYSQL_ROOT_PASSWORD=%s\nDB_USERNAME=%s\nDB_PASSWORD=%s\nREDIS_PASSWORD=%s\nJWT_SECRET=%s\nCAPTCHA_SECRET_KEY=%s\nCORS_ORIGINS=%s\nALLOWED_ORIGINS=%s\nHSTS_ENABLED=true\nREFERER_ENABLED=true\nOAUTH_ALLOWED_CALLBACKS=zhhhkl.us.ci\nTRUSTED_PROXY_IPS=172.30.0.10\nAPI_BASE_URL=%s\nIMPORT_TOKEN=%s\n' "$MYSQL_ROOT_PASSWORD" "$DB_USERNAME" "$DB_PASSWORD" "$REDIS_PASSWORD" "$JWT_SECRET" "$CAPTCHA_SECRET_KEY" "$CORS_ORIGINS" "$ALLOWED_ORIGINS" "$API_BASE_URL" "$IMPORT_TOKEN" > .env.prod

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weblog-deploy-artifacts
          path: |
            docker-compose.prod.yml
            nginx/
            .env.prod
          retention-days: 1

  deploy-to-server:
    runs-on: self-hosted
    needs: [build-and-push-backend, build-and-push-user, build-and-push-admin, prepare-artifacts]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: weblog-deploy-artifacts

      - name: Deploy
        run: |
          pwd
          ls -la
          cp docker-compose.prod.yml /opt/weblog/
          cp -r nginx/ /opt/weblog/
          cp .env.prod /opt/weblog/
          cd /opt/weblog
          docker compose -f docker-compose.prod.yml down || true
          echo "===== 拉取后端镜像 ====="
          docker pull ${{ env.REGISTRY }}/${{ github.repository }}/weblog-api:latest || true
          echo "===== 拉取用户端镜像 ====="
          docker pull ${{ env.REGISTRY }}/${{ github.repository }}/weblog-user:latest || true
          echo "===== 拉取管理端镜像并提取静态文件 ====="
          docker pull ${{ env.REGISTRY }}/${{ github.repository }}/weblog-admin:latest || true
          docker create --name admin-temp ${{ env.REGISTRY }}/${{ github.repository }}/weblog-admin:latest
          docker cp admin-temp:/usr/share/nginx/html/admin /opt/weblog/admin-static
          docker rm admin-temp
          docker compose -f docker-compose.prod.yml up -d
          sleep 20
          echo "===== 部署完成 ====="
          docker compose -f docker-compose.prod.yml ps
