name: Build & Deploy to Server

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-backend:
    # 仅在原始仓库执行，fork 仓库推送时不触发部署
    if: github.repository == 'lydh857/weblog'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run backend unit tests
        run: mvn -f weblog-backend/pom.xml -pl weblog-api -am test -q

      - name: Build Backend JAR
        run: |
          cd weblog-backend
          mvn clean package -DskipTests -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend API image
        uses: docker/build-push-action@v7
        with:
          context: ./weblog-backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/weblog-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-user:
    if: github.repository == 'lydh857/weblog'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Build User Frontend
        run: |
          cd weblog-user
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push User Frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./weblog-user
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/weblog-user:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-admin:
    if: github.repository == 'lydh857/weblog'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Build Admin Frontend
        run: |
          cd weblog-admin
          pnpm install --no-frozen-lockfile
          pnpm generate

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Admin Frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./weblog-admin
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/weblog-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  prepare-artifacts:
    if: github.repository == 'lydh857/weblog'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Create .env.prod
        env:
          DOCKER_IMAGE_API: ghcr.io/${{ github.repository }}/weblog-api:latest
          DOCKER_IMAGE_USER: ghcr.io/${{ github.repository }}/weblog-user:latest
          MYSQL_ROOT_PASSWORD: ${{ secrets.ENV_PROD_MYSQL_ROOT }}
          DB_USERNAME: ${{ secrets.ENV_PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.ENV_PROD_DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.ENV_PROD_REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.ENV_PROD_JWT_SECRET }}
          CAPTCHA_SECRET_KEY: ${{ secrets.ENV_PROD_CAPTCHA_SECRET_KEY }}
          STORAGE_PROVIDER: ${{ secrets.ENV_PROD_STORAGE_PROVIDER }}
          CORS_ORIGINS: ${{ secrets.ENV_PROD_CORS_ORIGINS }}
          ALLOWED_ORIGINS: ${{ secrets.ENV_PROD_ALLOWED_ORIGINS }}
          UPLOAD_BASE_URL: ${{ secrets.ENV_PROD_UPLOAD_BASE_URL }}
          OSS_ENDPOINT: ${{ secrets.ENV_PROD_OSS_ENDPOINT }}
          OSS_ACCESS_KEY_ID: ${{ secrets.ENV_PROD_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ENV_PROD_OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET_NAME: ${{ secrets.ENV_PROD_OSS_BUCKET_NAME }}
          OSS_CDN_DOMAIN: ${{ secrets.ENV_PROD_OSS_CDN_DOMAIN }}
          OSS_CONTENT_MODERATION_ENABLED: ${{ secrets.ENV_PROD_OSS_CONTENT_MODERATION_ENABLED }}
          R2_ENDPOINT: ${{ secrets.ENV_PROD_R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.ENV_PROD_R2_ACCESS_KEY_ID }}
          R2_ACCESS_KEY_SECRET: ${{ secrets.ENV_PROD_R2_ACCESS_KEY_SECRET }}
          R2_BUCKET_NAME: ${{ secrets.ENV_PROD_R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.ENV_PROD_R2_PUBLIC_BASE_URL }}
          R2_REGION: ${{ secrets.ENV_PROD_R2_REGION }}
          API_BASE_URL: ${{ secrets.ENV_PROD_API_BASE_URL }}
          API_INTERNAL_BASE_URL: ${{ secrets.ENV_PROD_API_INTERNAL_BASE_URL }}
          IMPORT_TOKEN: ${{ secrets.ENV_PROD_IMPORT_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          GITHUB_CLIENT_ID: ${{ secrets.ENV_PROD_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.ENV_PROD_GITHUB_CLIENT_SECRET }}
          OUTBOUND_LINK_ALLOWED_DOMAINS: ${{ secrets.ENV_PROD_OUTBOUND_LINK_ALLOWED_DOMAINS }}
          MAIL_SMTP_HOST: ${{ secrets.ENV_PROD_MAIL_SMTP_HOST }}
          MAIL_SMTP_PORT: ${{ secrets.ENV_PROD_MAIL_SMTP_PORT }}
          MAIL_USERNAME: ${{ secrets.ENV_PROD_MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.ENV_PROD_MAIL_PASSWORD }}
          MAIL_SSL_ENABLED: ${{ secrets.ENV_PROD_MAIL_SSL_ENABLED }}
          MAIL_FROM_NAME: ${{ secrets.ENV_PROD_MAIL_FROM_NAME }}
          MAIL_FROM_ADDRESS: ${{ secrets.ENV_PROD_MAIL_FROM_ADDRESS }}
          MAIL_CODE_EXPIRE_MINUTES: ${{ secrets.ENV_PROD_MAIL_CODE_EXPIRE_MINUTES }}
          MAIL_FALLBACK_ENABLED: ${{ secrets.ENV_PROD_MAIL_FALLBACK_ENABLED }}
          MAIL_FALLBACK_SMTP_HOST: ${{ secrets.ENV_PROD_MAIL_FALLBACK_SMTP_HOST }}
          MAIL_FALLBACK_SMTP_PORT: ${{ secrets.ENV_PROD_MAIL_FALLBACK_SMTP_PORT }}
          MAIL_FALLBACK_USERNAME: ${{ secrets.ENV_PROD_MAIL_FALLBACK_USERNAME }}
          MAIL_FALLBACK_PASSWORD: ${{ secrets.ENV_PROD_MAIL_FALLBACK_PASSWORD }}
          MAIL_FALLBACK_SSL_ENABLED: ${{ secrets.ENV_PROD_MAIL_FALLBACK_SSL_ENABLED }}
        run: |
          cat > .env.prod << ENVEOF
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          DB_USERNAME=${DB_USERNAME}
          DB_PASSWORD=${DB_PASSWORD}
          REDIS_PASSWORD=${REDIS_PASSWORD}
          JWT_SECRET=${JWT_SECRET}
          CAPTCHA_SECRET_KEY=${CAPTCHA_SECRET_KEY}
          STORAGE_PROVIDER=${STORAGE_PROVIDER}
          CORS_ORIGINS=${CORS_ORIGINS}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
          UPLOAD_BASE_URL=${UPLOAD_BASE_URL}
          OSS_ENDPOINT=${OSS_ENDPOINT}
          OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
          OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
          OSS_BUCKET_NAME=${OSS_BUCKET_NAME}
          OSS_CDN_DOMAIN=${OSS_CDN_DOMAIN}
          OSS_CONTENT_MODERATION_ENABLED=${OSS_CONTENT_MODERATION_ENABLED}
          R2_ENDPOINT=${R2_ENDPOINT}
          R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
          R2_ACCESS_KEY_SECRET=${R2_ACCESS_KEY_SECRET}
          R2_BUCKET_NAME=${R2_BUCKET_NAME}
          R2_PUBLIC_BASE_URL=${R2_PUBLIC_BASE_URL}
          R2_REGION=${R2_REGION}
          HSTS_ENABLED=true
          REFERER_ENABLED=true
          OAUTH_ALLOWED_CALLBACKS=${OAUTH_ALLOWED_CALLBACKS}
          BLOG_SECURITY_OUTBOUND_LINK_ALLOWED_DOMAINS=${OUTBOUND_LINK_ALLOWED_DOMAINS}
          TRUSTED_PROXY_IPS=172.30.0.10
          API_BASE_URL=${API_BASE_URL}
          API_INTERNAL_BASE_URL=${API_INTERNAL_BASE_URL:-http://weblog-api:9091}
          IMPORT_TOKEN=${IMPORT_TOKEN}
          AI_API_KEY=${AI_API_KEY}
          AI_BASE_URL=${AI_BASE_URL}
          AI_MODEL=${AI_MODEL}
          GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
          GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
          MAIL_SMTP_HOST=${MAIL_SMTP_HOST}
          MAIL_SMTP_PORT=${MAIL_SMTP_PORT}
          MAIL_USERNAME=${MAIL_USERNAME}
          MAIL_PASSWORD=${MAIL_PASSWORD}
          MAIL_SSL_ENABLED=${MAIL_SSL_ENABLED}
          MAIL_FROM_NAME=${MAIL_FROM_NAME}
          MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
          MAIL_CODE_EXPIRE_MINUTES=${MAIL_CODE_EXPIRE_MINUTES}
          MAIL_FALLBACK_ENABLED=${MAIL_FALLBACK_ENABLED}
          MAIL_FALLBACK_SMTP_HOST=${MAIL_FALLBACK_SMTP_HOST}
          MAIL_FALLBACK_SMTP_PORT=${MAIL_FALLBACK_SMTP_PORT}
          MAIL_FALLBACK_USERNAME=${MAIL_FALLBACK_USERNAME}
          MAIL_FALLBACK_PASSWORD=${MAIL_FALLBACK_PASSWORD}
          MAIL_FALLBACK_SSL_ENABLED=${MAIL_FALLBACK_SSL_ENABLED}
          DOCKER_IMAGE_API=${DOCKER_IMAGE_API}
          DOCKER_IMAGE_USER=${DOCKER_IMAGE_USER}
          ENVEOF

      - name: Upload all artifacts
        uses: actions/upload-artifact@v6
        with:
          name: weblog-deploy-artifacts
          path: |
            docker-compose.prod.yml
            nginx/
          retention-days: 1

  deploy-to-server:
    if: github.repository == 'lydh857/weblog'
    runs-on: [self-hosted, prod]
    needs: [build-and-push-backend, build-and-push-user, build-and-push-admin, prepare-artifacts]
    permissions:
      packages: read
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: weblog-deploy-artifacts
          path: /opt/weblog/deploy

      - name: Copy configs
        run: |
          cp /opt/weblog/deploy/docker-compose.prod.yml /opt/weblog/
          cp -r /opt/weblog/deploy/nginx/ /opt/weblog/

      - name: Create .env.prod
        run: |
          cat > /opt/weblog/.env.prod << ENVEOF
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          DB_USERNAME=${DB_USERNAME}
          DB_PASSWORD=${DB_PASSWORD}
          REDIS_PASSWORD=${REDIS_PASSWORD}
          JWT_SECRET=${JWT_SECRET}
          CAPTCHA_SECRET_KEY=${CAPTCHA_SECRET_KEY}
          STORAGE_PROVIDER=${STORAGE_PROVIDER}
          CORS_ORIGINS=${CORS_ORIGINS}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
          UPLOAD_BASE_URL=${UPLOAD_BASE_URL}
          OSS_ENDPOINT=${OSS_ENDPOINT}
          OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
          OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
          OSS_BUCKET_NAME=${OSS_BUCKET_NAME}
          OSS_CDN_DOMAIN=${OSS_CDN_DOMAIN}
          OSS_CONTENT_MODERATION_ENABLED=${OSS_CONTENT_MODERATION_ENABLED}
          R2_ENDPOINT=${R2_ENDPOINT}
          R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
          R2_ACCESS_KEY_SECRET=${R2_ACCESS_KEY_SECRET}
          R2_BUCKET_NAME=${R2_BUCKET_NAME}
          R2_PUBLIC_BASE_URL=${R2_PUBLIC_BASE_URL}
          R2_REGION=${R2_REGION}
          API_BASE_URL=${API_BASE_URL}
          API_INTERNAL_BASE_URL=${API_INTERNAL_BASE_URL:-http://weblog-api:9091}
          IMPORT_TOKEN=${IMPORT_TOKEN}
          AI_API_KEY=${AI_API_KEY}
          AI_BASE_URL=${AI_BASE_URL}
          AI_MODEL=${AI_MODEL}
          HSTS_ENABLED=true
          REFERER_ENABLED=true
          OAUTH_ALLOWED_CALLBACKS=${OAUTH_ALLOWED_CALLBACKS}
          BLOG_SECURITY_OUTBOUND_LINK_ALLOWED_DOMAINS=${OUTBOUND_LINK_ALLOWED_DOMAINS}
          TRUSTED_PROXY_IPS=172.30.0.10
          GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
          GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
          MAIL_SMTP_HOST=${MAIL_SMTP_HOST}
          MAIL_SMTP_PORT=${MAIL_SMTP_PORT}
          MAIL_USERNAME=${MAIL_USERNAME}
          MAIL_PASSWORD=${MAIL_PASSWORD}
          MAIL_SSL_ENABLED=${MAIL_SSL_ENABLED}
          MAIL_FROM_NAME=${MAIL_FROM_NAME}
          MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
          MAIL_CODE_EXPIRE_MINUTES=${MAIL_CODE_EXPIRE_MINUTES}
          MAIL_FALLBACK_ENABLED=${MAIL_FALLBACK_ENABLED}
          MAIL_FALLBACK_SMTP_HOST=${MAIL_FALLBACK_SMTP_HOST}
          MAIL_FALLBACK_SMTP_PORT=${MAIL_FALLBACK_SMTP_PORT}
          MAIL_FALLBACK_USERNAME=${MAIL_FALLBACK_USERNAME}
          MAIL_FALLBACK_PASSWORD=${MAIL_FALLBACK_PASSWORD}
          MAIL_FALLBACK_SSL_ENABLED=${MAIL_FALLBACK_SSL_ENABLED}
          DOCKER_IMAGE_API=${DOCKER_IMAGE_API}
          DOCKER_IMAGE_USER=${DOCKER_IMAGE_USER}
          ENVEOF
        env:
          DOCKER_IMAGE_API: ghcr.io/${{ github.repository }}/weblog-api:latest
          DOCKER_IMAGE_USER: ghcr.io/${{ github.repository }}/weblog-user:latest
          MYSQL_ROOT_PASSWORD: ${{ secrets.ENV_PROD_MYSQL_ROOT }}
          DB_USERNAME: ${{ secrets.ENV_PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.ENV_PROD_DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.ENV_PROD_REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.ENV_PROD_JWT_SECRET }}
          CAPTCHA_SECRET_KEY: ${{ secrets.ENV_PROD_CAPTCHA_SECRET_KEY }}
          STORAGE_PROVIDER: ${{ secrets.ENV_PROD_STORAGE_PROVIDER }}
          CORS_ORIGINS: ${{ secrets.ENV_PROD_CORS_ORIGINS }}
          ALLOWED_ORIGINS: ${{ secrets.ENV_PROD_ALLOWED_ORIGINS }}
          UPLOAD_BASE_URL: ${{ secrets.ENV_PROD_UPLOAD_BASE_URL }}
          OSS_ENDPOINT: ${{ secrets.ENV_PROD_OSS_ENDPOINT }}
          OSS_ACCESS_KEY_ID: ${{ secrets.ENV_PROD_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ENV_PROD_OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET_NAME: ${{ secrets.ENV_PROD_OSS_BUCKET_NAME }}
          OSS_CDN_DOMAIN: ${{ secrets.ENV_PROD_OSS_CDN_DOMAIN }}
          OSS_CONTENT_MODERATION_ENABLED: ${{ secrets.ENV_PROD_OSS_CONTENT_MODERATION_ENABLED }}
          R2_ENDPOINT: ${{ secrets.ENV_PROD_R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.ENV_PROD_R2_ACCESS_KEY_ID }}
          R2_ACCESS_KEY_SECRET: ${{ secrets.ENV_PROD_R2_ACCESS_KEY_SECRET }}
          R2_BUCKET_NAME: ${{ secrets.ENV_PROD_R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.ENV_PROD_R2_PUBLIC_BASE_URL }}
          R2_REGION: ${{ secrets.ENV_PROD_R2_REGION }}
          API_BASE_URL: ${{ secrets.ENV_PROD_API_BASE_URL }}
          API_INTERNAL_BASE_URL: ${{ secrets.ENV_PROD_API_INTERNAL_BASE_URL }}
          IMPORT_TOKEN: ${{ secrets.ENV_PROD_IMPORT_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          GITHUB_CLIENT_ID: ${{ secrets.ENV_PROD_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.ENV_PROD_GITHUB_CLIENT_SECRET }}
          OUTBOUND_LINK_ALLOWED_DOMAINS: ${{ secrets.ENV_PROD_OUTBOUND_LINK_ALLOWED_DOMAINS }}
          MAIL_SMTP_HOST: ${{ secrets.ENV_PROD_MAIL_SMTP_HOST }}
          MAIL_SMTP_PORT: ${{ secrets.ENV_PROD_MAIL_SMTP_PORT }}
          MAIL_USERNAME: ${{ secrets.ENV_PROD_MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.ENV_PROD_MAIL_PASSWORD }}
          MAIL_SSL_ENABLED: ${{ secrets.ENV_PROD_MAIL_SSL_ENABLED }}
          MAIL_FROM_NAME: ${{ secrets.ENV_PROD_MAIL_FROM_NAME }}
          MAIL_FROM_ADDRESS: ${{ secrets.ENV_PROD_MAIL_FROM_ADDRESS }}
          MAIL_CODE_EXPIRE_MINUTES: ${{ secrets.ENV_PROD_MAIL_CODE_EXPIRE_MINUTES }}
          MAIL_FALLBACK_ENABLED: ${{ secrets.ENV_PROD_MAIL_FALLBACK_ENABLED }}
          MAIL_FALLBACK_SMTP_HOST: ${{ secrets.ENV_PROD_MAIL_FALLBACK_SMTP_HOST }}
          MAIL_FALLBACK_SMTP_PORT: ${{ secrets.ENV_PROD_MAIL_FALLBACK_SMTP_PORT }}
          MAIL_FALLBACK_USERNAME: ${{ secrets.ENV_PROD_MAIL_FALLBACK_USERNAME }}
          MAIL_FALLBACK_PASSWORD: ${{ secrets.ENV_PROD_MAIL_FALLBACK_PASSWORD }}
          MAIL_FALLBACK_SSL_ENABLED: ${{ secrets.ENV_PROD_MAIL_FALLBACK_SSL_ENABLED }}

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        run: |
          run_with_timeout() {
            seconds="$1"
            shift
            if command -v timeout >/dev/null 2>&1; then
              timeout "$seconds" "$@"
            else
              "$@"
            fi
          }

          retry_pull() {
            image="$1"
            timeout_seconds="$2"
            if [ -z "$timeout_seconds" ]; then
              timeout_seconds=900
            fi
            attempts=4
            i=1
            while [ "$i" -le "$attempts" ]; do
              echo "[INFO] pulling image (timeout=${timeout_seconds}s): $image"
              if run_with_timeout "$timeout_seconds" docker pull "$image"; then
                return 0
              else
                exit_code=$?
              fi
              if [ "$exit_code" -eq 124 ]; then
                echo "[WARN] pull timeout (${timeout_seconds}s) ($i/$attempts): $image"
              else
                echo "[WARN] pull failed (exit=$exit_code) ($i/$attempts): $image"
              fi
              sleep $((i * 10))
              i=$((i + 1))
            done
            return 1
          }

          retry_compose_up() {
            attempts=3
            i=1
            while [ "$i" -le "$attempts" ]; do
              if run_with_timeout 900 docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans; then
                return 0
              fi
              echo "[WARN] docker compose up failed ($i/$attempts), retrying..."
              echo "----- compose ps (attempt $i) -----"
              docker compose --env-file .env.prod -f docker-compose.prod.yml ps || true
              echo "----- weblog-api logs (tail 200) -----"
              docker logs --tail=200 weblog-api || true
              echo "----- weblog-api health state -----"
              docker inspect --format='{{json .State.Health}}' weblog-api || true
              sleep $((i * 15))
              i=$((i + 1))
            done
            return 1
          }

          cd /opt/weblog
          test -s .env.prod
          echo "===== 拉取后端镜像 ====="
          retry_pull ${{ env.REGISTRY }}/${{ github.repository }}/weblog-api:latest 900
          echo "===== 拉取用户端镜像 ====="
          retry_pull ${{ env.REGISTRY }}/${{ github.repository }}/weblog-user:latest 900
          echo "===== 拉取管理端镜像并提取静态文件 ====="
          retry_pull ${{ env.REGISTRY }}/${{ github.repository }}/weblog-admin:latest 900
          echo "===== 拉取基础镜像（Docker Hub） ====="
          retry_pull mysql:8.0.36 420
          retry_pull redis:7.2-alpine 420
          retry_pull nginx:alpine 420
          docker rm -f admin-temp >/dev/null 2>&1 || true
          rm -rf /opt/weblog/admin-static/*
          docker create --name admin-temp ${{ env.REGISTRY }}/${{ github.repository }}/weblog-admin:latest
          docker cp admin-temp:/usr/share/nginx/html/admin/. /opt/weblog/admin-static
          docker rm admin-temp

          mkdir -p /opt/weblog/uploads
          if docker inspect weblog-api >/dev/null 2>&1; then
            docker cp weblog-api:/app/uploads/. /opt/weblog/uploads/ >/dev/null 2>&1 || true
          fi
          chown -R 1000:1000 /opt/weblog/uploads
          chmod -R u+rwX,go+rX /opt/weblog/uploads

          if [ ! -f /opt/weblog/admin-static/index.html ] && [ -f /opt/weblog/admin-static/200.html ]; then
            cp /opt/weblog/admin-static/200.html /opt/weblog/admin-static/index.html
          fi

          if [ ! -f /opt/weblog/admin-static/index.html ]; then
            echo "[ERROR] admin-static/index.html is missing after image extraction"
            exit 1
          fi

          if ! grep -q "_nuxt" /opt/weblog/admin-static/index.html; then
            echo "[ERROR] admin-static/index.html is not a Nuxt entry page"
            exit 1
          fi

          retry_compose_up
          echo "===== SSR 到 API 内网链路自检 ====="
          docker exec weblog-user sh -lc 'echo "NUXT_API_INTERNAL_BASE=$NUXT_API_INTERNAL_BASE"'
          docker exec weblog-user sh -lc 'wget -qO- http://weblog-api:9091/actuator/health/liveness >/dev/null'
          docker exec weblog-user sh -lc 'wget -qO- "http://weblog-api:9091/api/portal/post/recent?pageNum=1&pageSize=1" >/dev/null'
          sleep 20
          echo "===== 部署完成 ====="
          docker compose --env-file .env.prod -f docker-compose.prod.yml ps
