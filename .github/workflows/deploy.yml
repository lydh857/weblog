name: Build & Deploy to Aliyun

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build Backend JAR
        run: |
          cd weblog-backend
          mvn clean package -DskipTests -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend API image
        uses: docker/build-push-action@v5
        with:
          context: ./weblog-backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/weblog-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-user:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Build User Frontend
        run: |
          cd weblog-user
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push User Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./weblog-user
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/weblog-user:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-admin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Build Admin Frontend
        run: |
          cd weblog-admin
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Admin Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./weblog-admin
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/weblog-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: [build-and-push-backend, build-and-push-user, build-and-push-admin]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Upload configs to server via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          overwrite: true
          source: |
            docker-compose.prod.yml
            nginx/
          target: /opt/weblog
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/weblog

            # 创建 .env.prod
            printf '%s\n' \
              "MYSQL_ROOT_PASSWORD=${ENV_PROD_MYSQL_ROOT}" \
              "DB_USERNAME=${ENV_PROD_DB_USERNAME}" \
              "DB_PASSWORD=${ENV_PROD_DB_PASSWORD}" \
              "REDIS_PASSWORD=${ENV_PROD_REDIS_PASSWORD}" \
              "JWT_SECRET=${ENV_PROD_JWT_SECRET}" \
              "CAPTCHA_SECRET_KEY=${ENV_PROD_CAPTCHA_SECRET_KEY}" \
              "CORS_ORIGINS=${ENV_PROD_CORS_ORIGINS}" \
              "ALLOWED_ORIGINS=${ENV_PROD_ALLOWED_ORIGINS}" \
              "HSTS_ENABLED=true" \
              "REFERER_ENABLED=true" \
              "OAUTH_ALLOWED_CALLBACKS=zhhhkl.us.ci" \
              "TRUSTED_PROXY_IPS=172.30.0.10" \
              "API_BASE_URL=${ENV_PROD_API_BASE_URL}" \
              "IMPORT_TOKEN=${ENV_PROD_IMPORT_TOKEN}" \
              > .env.prod

            # 停止旧容器
            docker compose -f docker-compose.prod.yml down || true

            # 拉取最新镜像
            echo "===== 拉取后端镜像 ====="
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}/weblog-api:latest || true

            echo "===== 拉取用户端镜像 ====="
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}/weblog-user:latest || true

            echo "===== 拉取管理端镜像并提取静态文件 ====="
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}/weblog-admin:latest || true
            docker create --name admin-temp ${{ env.REGISTRY }}/${{ github.repository }}/weblog-admin:latest
            docker cp admin-temp:/usr/share/nginx/html/admin /opt/weblog/admin-static
            docker rm admin-temp

            # 启动容器（image 模式，不再需要 build）
            docker compose -f docker-compose.prod.yml up -d

            # 健康检查
            sleep 20
            echo "===== 部署完成 ====="
            docker compose -f docker-compose.prod.yml ps
