name: Build & Deploy to Aliyun

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build Backend JAR
        run: |
          cd weblog-backend
          mvn clean package -DskipTests -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend API image
        uses: docker/build-push-action@v7
        with:
          context: ./weblog-backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/weblog-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-user:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Build User Frontend
        run: |
          cd weblog-user
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push User Frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./weblog-user
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/weblog-user:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-admin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Build Admin Frontend
        run: |
          cd weblog-admin
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Admin Frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./weblog-admin
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/weblog-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  prepare-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Create .env.prod
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.ENV_PROD_MYSQL_ROOT }}
          DB_USERNAME: ${{ secrets.ENV_PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.ENV_PROD_DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.ENV_PROD_REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.ENV_PROD_JWT_SECRET }}
          CAPTCHA_SECRET_KEY: ${{ secrets.ENV_PROD_CAPTCHA_SECRET_KEY }}
          CORS_ORIGINS: ${{ secrets.ENV_PROD_CORS_ORIGINS }}
          ALLOWED_ORIGINS: ${{ secrets.ENV_PROD_ALLOWED_ORIGINS }}
          API_BASE_URL: ${{ secrets.ENV_PROD_API_BASE_URL }}
          IMPORT_TOKEN: ${{ secrets.ENV_PROD_IMPORT_TOKEN }}
          GITHUB_CLIENT_ID: ${{ secrets.ENV_PROD_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.ENV_PROD_GITHUB_CLIENT_SECRET }}
        run: |
          printf 'MYSQL_ROOT_PASSWORD=%s\nDB_USERNAME=%s\nDB_PASSWORD=%s\nREDIS_PASSWORD=%s\nJWT_SECRET=%s\nCAPTCHA_SECRET_KEY=%s\nCORS_ORIGINS=%s\nALLOWED_ORIGINS=%s\nHSTS_ENABLED=true\nREFERER_ENABLED=true\nOAUTH_ALLOWED_CALLBACKS=zhhhkl.us.ci\nTRUSTED_PROXY_IPS=172.30.0.10\nAPI_BASE_URL=%s\nIMPORT_TOKEN=%s\nGITHUB_CLIENT_ID=%s\nGITHUB_CLIENT_SECRET=%s\n' "$MYSQL_ROOT_PASSWORD" "$DB_USERNAME" "$DB_PASSWORD" "$REDIS_PASSWORD" "$JWT_SECRET" "$CAPTCHA_SECRET_KEY" "$CORS_ORIGINS" "$ALLOWED_ORIGINS" "$API_BASE_URL" "$IMPORT_TOKEN" "$GITHUB_CLIENT_ID" "$GITHUB_CLIENT_SECRET" > .env.prod

      - name: Upload all artifacts
        uses: actions/upload-artifact@v6
        with:
          name: weblog-deploy-artifacts
          path: |
            docker-compose.prod.yml
            nginx/
            database/sql/init/
          retention-days: 1

  deploy-to-server:
    runs-on: self-hosted
    needs: [build-and-push-backend, build-and-push-user, build-and-push-admin, prepare-artifacts]
    permissions:
      packages: read
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: weblog-deploy-artifacts
          path: /opt/weblog/deploy

      - name: Copy configs
        run: |
          cp /opt/weblog/deploy/docker-compose.prod.yml /opt/weblog/
          cp -r /opt/weblog/deploy/nginx/ /opt/weblog/
          mkdir -p /opt/weblog/database/sql
          rm -rf /opt/weblog/database/sql/init
          cp -r /opt/weblog/deploy/database/sql/init /opt/weblog/database/sql/

      - name: Create .env.prod
        run: |
          printf 'MYSQL_ROOT_PASSWORD=%s\nDB_USERNAME=%s\nDB_PASSWORD=%s\nREDIS_PASSWORD=%s\nJWT_SECRET=%s\nCAPTCHA_SECRET_KEY=%s\nCORS_ORIGINS=%s\nALLOWED_ORIGINS=%s\nAPI_BASE_URL=%s\nIMPORT_TOKEN=%s\nHSTS_ENABLED=true\nREFERER_ENABLED=true\nOAUTH_ALLOWED_CALLBACKS=zhhhkl.us.ci\nTRUSTED_PROXY_IPS=172.30.0.10\nGITHUB_CLIENT_ID=%s\nGITHUB_CLIENT_SECRET=%s\n' "$MYSQL_ROOT_PASSWORD" "$DB_USERNAME" "$DB_PASSWORD" "$REDIS_PASSWORD" "$JWT_SECRET" "$CAPTCHA_SECRET_KEY" "$CORS_ORIGINS" "$ALLOWED_ORIGINS" "$API_BASE_URL" "$IMPORT_TOKEN" "$GITHUB_CLIENT_ID" "$GITHUB_CLIENT_SECRET" > /opt/weblog/.env.prod
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.ENV_PROD_MYSQL_ROOT }}
          DB_USERNAME: ${{ secrets.ENV_PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.ENV_PROD_DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.ENV_PROD_REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.ENV_PROD_JWT_SECRET }}
          CAPTCHA_SECRET_KEY: ${{ secrets.ENV_PROD_CAPTCHA_SECRET_KEY }}
          CORS_ORIGINS: ${{ secrets.ENV_PROD_CORS_ORIGINS }}
          ALLOWED_ORIGINS: ${{ secrets.ENV_PROD_ALLOWED_ORIGINS }}
          API_BASE_URL: ${{ secrets.ENV_PROD_API_BASE_URL }}
          IMPORT_TOKEN: ${{ secrets.ENV_PROD_IMPORT_TOKEN }}
          GITHUB_CLIENT_ID: ${{ secrets.ENV_PROD_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.ENV_PROD_GITHUB_CLIENT_SECRET }}

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.ENV_PROD_MYSQL_ROOT }}
        run: |
          run_with_timeout() {
            seconds="$1"
            shift
            if command -v timeout >/dev/null 2>&1; then
              timeout "$seconds" "$@"
            else
              "$@"
            fi
          }

          retry_pull() {
            image="$1"
            timeout_seconds="$2"
            if [ -z "$timeout_seconds" ]; then
              timeout_seconds=900
            fi
            attempts=4
            i=1
            while [ "$i" -le "$attempts" ]; do
              echo "[INFO] pulling image (timeout=${timeout_seconds}s): $image"
              run_with_timeout "$timeout_seconds" docker pull "$image"
              exit_code=$?
              if [ "$exit_code" -eq 0 ]; then
                return 0
              fi
              if [ "$exit_code" -eq 124 ]; then
                echo "[WARN] pull timeout (${timeout_seconds}s) ($i/$attempts): $image"
              else
                echo "[WARN] pull failed (exit=$exit_code) ($i/$attempts): $image"
              fi
              sleep $((i * 10))
              i=$((i + 1))
            done
            return 1
          }

          retry_compose_up() {
            attempts=3
            i=1
            while [ "$i" -le "$attempts" ]; do
              if run_with_timeout 900 docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans; then
                return 0
              fi
              echo "[WARN] docker compose up failed ($i/$attempts), retrying..."
              echo "----- compose ps (attempt $i) -----"
              docker compose --env-file .env.prod -f docker-compose.prod.yml ps || true
              echo "----- weblog-api logs (tail 200) -----"
              docker logs --tail=200 weblog-api || true
              echo "----- weblog-api health state -----"
              docker inspect --format='{{json .State.Health}}' weblog-api || true
              sleep $((i * 15))
              i=$((i + 1))
            done
            return 1
          }

          wait_for_mysql_ready() {
            attempts=60
            i=1
            while [ "$i" -le "$attempts" ]; do
              if docker exec weblog-mysql mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD" --silent >/dev/null 2>&1; then
                return 0
              fi
              sleep 3
              i=$((i + 1))
            done
            return 1
          }

          ensure_database_initialized() {
            if docker exec weblog-mysql sh -c "mysql -uroot -p\"$MYSQL_ROOT_PASSWORD\" -D weblog -e 'SELECT 1 FROM t_system_config LIMIT 1' >/dev/null 2>&1"; then
              echo "[INFO] database schema already initialized"
              return 0
            fi

            if [ ! -f /opt/weblog/database/sql/init/02-schema.sql ] || [ ! -f /opt/weblog/database/sql/init/03-data.sql ]; then
              echo "[ERROR] missing database init scripts under /opt/weblog/database/sql/init"
              return 1
            fi

            echo "[INFO] schema not found, importing init SQL"
            docker exec -i weblog-mysql sh -c "mysql -uroot -p\"$MYSQL_ROOT_PASSWORD\" weblog" < /opt/weblog/database/sql/init/02-schema.sql
            docker exec -i weblog-mysql sh -c "mysql -uroot -p\"$MYSQL_ROOT_PASSWORD\" weblog" < /opt/weblog/database/sql/init/03-data.sql
          }

          cd /opt/weblog
          test -s .env.prod
          echo "===== 拉取后端镜像 ====="
          retry_pull ${{ env.REGISTRY }}/${{ github.repository }}/weblog-api:latest 900
          echo "===== 拉取用户端镜像 ====="
          retry_pull ${{ env.REGISTRY }}/${{ github.repository }}/weblog-user:latest 900
          echo "===== 拉取管理端镜像并提取静态文件 ====="
          retry_pull ${{ env.REGISTRY }}/${{ github.repository }}/weblog-admin:latest 900
          echo "===== 拉取基础镜像（Docker Hub） ====="
          retry_pull mysql:8.0.36 420
          retry_pull redis:7.2-alpine 420
          retry_pull nginx:alpine 420
          docker rm -f admin-temp >/dev/null 2>&1 || true
          docker create --name admin-temp ${{ env.REGISTRY }}/${{ github.repository }}/weblog-admin:latest
          docker cp admin-temp:/usr/share/nginx/html/admin /opt/weblog/admin-static
          docker rm admin-temp

          echo "===== 启动基础依赖 ====="
          run_with_timeout 900 docker compose --env-file .env.prod -f docker-compose.prod.yml up -d mysql redis
          echo "===== 等待 MySQL 就绪 ====="
          wait_for_mysql_ready
          echo "===== 校验数据库初始化 ====="
          ensure_database_initialized

          retry_compose_up
          sleep 20
          echo "===== 部署完成 ====="
          docker compose --env-file .env.prod -f docker-compose.prod.yml ps
