name: Frontend Security Audit

on:
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  frontend-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - weblog-user
          - weblog-admin

    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: |
            weblog-user/pnpm-lock.yaml
            weblog-admin/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: pnpm install --frozen-lockfile --registry=https://registry.npmjs.org

      - name: Audit production dependencies (high gate)
        working-directory: ${{ matrix.project }}
        run: pnpm audit --prod --audit-level=high --registry=https://registry.npmjs.org
