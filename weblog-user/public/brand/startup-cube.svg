<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="cube-grid-top" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(25)">
      <rect x="0" y="0" width="12" height="12" fill="none" stroke="rgba(255, 255, 255, 0.35)" stroke-width="1" />
    </pattern>
    <pattern id="cube-grid-left" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="skewY(15)">
      <rect x="0" y="0" width="12" height="12" fill="none" stroke="rgba(255, 255, 255, 0.35)" stroke-width="1" />
    </pattern>
    <pattern id="cube-grid-right" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="skewY(-15)">
      <rect x="0" y="0" width="12" height="12" fill="none" stroke="rgba(255, 255, 255, 0.35)" stroke-width="1" />
    </pattern>
  </defs>

  <ellipse cx="60" cy="89" rx="26" ry="8" fill="rgba(26, 54, 112, 0.26)" />

  <g>
    <polygon points="60 18 88 32 60 46 32 32" fill="#9ec1ff" stroke="#2f5fbf" stroke-width="1.4" stroke-linejoin="round" />
    <polygon points="32 32 60 46 60 78 32 64" fill="#6f9cf0" stroke="#2f5fbf" stroke-width="1.4" stroke-linejoin="round" />
    <polygon points="88 32 60 46 60 78 88 64" fill="#4f7ddf" stroke="#2f5fbf" stroke-width="1.4" stroke-linejoin="round" />

    <polygon points="60 18 88 32 60 46 32 32" fill="url(#cube-grid-top)" opacity="0.55" />
    <polygon points="32 32 60 46 60 78 32 64" fill="url(#cube-grid-left)" opacity="0.55" />
    <polygon points="88 32 60 46 60 78 88 64" fill="url(#cube-grid-right)" opacity="0.55" />

    <polyline points="32 32 60 18 88 32" fill="none" stroke="#2f5fbf" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round" />
    <polyline points="32 32 32 64 60 78 88 64 88 32" fill="none" stroke="#2f5fbf" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="60" y1="46" x2="60" y2="78" stroke="#2f5fbf" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
