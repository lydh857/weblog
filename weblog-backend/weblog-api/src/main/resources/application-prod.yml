spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/weblog?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 8
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 3000ms
      timeout: 5000ms

server:
  tomcat:
    threads:
      max: 80
      min-spare: 8
    accept-count: 60
    max-connections: 512
    connection-timeout: 5s

# 生产环境日志 - 输出到文件，级别 info
logging:
  level:
    root: info
    com.blog: info
    com.baomidou.mybatisplus: warn
  file:
    name: /var/log/weblog/application.log
    max-size: 50MB
    max-history: 5
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 生产环境关闭 Knife4j 文档
knife4j:
  enable: false

# 生产环境关闭 Sa-Token 日志
sa-token:
  is-log: false
  jwt-secret-key: ${JWT_SECRET}
  cookie:
    secure: true
    same-site: Strict
  refresh-cookie:
    secure: true
    same-site: Strict

# 生产环境验证码配置
captcha:
  secret-key: ${CAPTCHA_SECRET_KEY}

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# GitHub OAuth 配置
github:
  oauth:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    allowed-callbacks: ${OAUTH_ALLOWED_CALLBACKS:}

# 生产环境业务配置
blog:
  async:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 100
    keep-alive-seconds: 60
  ai:
    async:
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 50
      keep-alive-seconds: 60
  cors:
    allowed-origins: ${CORS_ORIGINS:https://yourdomain.com}
  security:
    dev-bypass-enabled: false
    hsts-enabled: true
    referer-enabled: true
    sensitive-words:
      location: ${SENSITIVE_WORDS_LOCATION:classpath:sensitive/sensi_words.txt}
    attack-alert:
      enabled: true
      interval-ms: 300000
      initial-delay-ms: 60000
      window-minutes: 5
      total-failed-threshold: 60
      per-ip-threshold: 12
      top-ip-limit: 5
      suppress-minutes: 10
      max-alerts-per-hour: 6
      slow-query-warn-ms: 500
      adaptive-threshold-enabled: true
      adaptive-threshold-alpha: 0.25
      adaptive-threshold-multiplier: 2.2
      adaptive-threshold-min: 60
    log-cleanup:
      enabled: true
      cron: "0 30 4 * * ?"
      login-log-retention-days: 90
      audit-log-retention-days: 90
      archive-enabled: true
      archive-batch-size: 20000
    data-governance:
      enabled: true
      cron: "0 40 4 * * ?"
      user-view-log-retention-days: 120
      post-ranking-retention-days: 180
      post-read-daily-retention-days: 365
      orphan-check-enabled: true
      collation-check-enabled: true
      collation-baseline: utf8mb4_0900_ai_ci
      notify-on-anomaly: false
      capacity:
        user-view-log-warn-rows: 5000000
        post-ranking-warn-rows: 500000
        login-log-warn-rows: 3000000
        audit-log-warn-rows: 3000000
