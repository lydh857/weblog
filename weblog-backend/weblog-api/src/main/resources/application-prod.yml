spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/weblog?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 8
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 3000ms
      timeout: 5000ms

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false
    clean-disabled: true
    placeholder-replacement: false

server:
  tomcat:
    threads:
      max: 80
      min-spare: 8
    accept-count: 60
    max-connections: 512
    connection-timeout: 5s

# 生产环境日志 - 输出到文件，级别 info
logging:
  level:
    root: info
    com.blog: info
    com.baomidou.mybatisplus: warn
  file:
    name: /var/log/weblog/application.log
    max-size: 50MB
    max-history: 5
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 生产环境关闭 Knife4j 文档
knife4j:
  enable: false

# 生产环境关闭 Sa-Token 日志
sa-token:
  is-log: false
  jwt-secret-key: ${JWT_SECRET}
  cookie:
    secure: true
    same-site: Strict
  refresh-cookie:
    secure: true
    same-site: Strict

# 生产环境验证码配置
captcha:
  secret-key: ${CAPTCHA_SECRET_KEY}
  verify-token-expire-seconds: ${CAPTCHA_VERIFY_TOKEN_EXPIRE_SECONDS:120}

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# GitHub OAuth 配置
github:
  oauth:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    allowed-callbacks: ${OAUTH_ALLOWED_CALLBACKS:}

# 存储后端：local | aliyun-oss | r2
storage:
  provider: ${STORAGE_PROVIDER:local}

# 阿里云 OSS（storage.provider=aliyun-oss 时生效）
oss:
  endpoint: ${OSS_ENDPOINT:}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET_NAME:}
  cdn-domain: ${OSS_CDN_DOMAIN:}
  sign-url-expire-seconds: ${OSS_SIGN_URL_EXPIRE_SECONDS:300}
  content-moderation-enabled: ${OSS_CONTENT_MODERATION_ENABLED:false}

# Cloudflare R2（storage.provider=r2 时生效）
r2:
  endpoint: ${R2_ENDPOINT:}
  access-key-id: ${R2_ACCESS_KEY_ID:}
  access-key-secret: ${R2_ACCESS_KEY_SECRET:}
  bucket-name: ${R2_BUCKET_NAME:}
  public-base-url: ${R2_PUBLIC_BASE_URL:}
  region: ${R2_REGION:auto}
  sign-url-expire-seconds: ${R2_SIGN_URL_EXPIRE_SECONDS:300}

# 生产环境业务配置
blog:
  async:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 100
    keep-alive-seconds: 60
  ai:
    async:
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 50
      keep-alive-seconds: 60
  cors:
    allowed-origins: ${CORS_ORIGINS:}
  upload:
    base-url: ${UPLOAD_BASE_URL:https://zhhhkl.top/uploads}
  security:
    dev-bypass-enabled: false
    hsts-enabled: true
    referer-enabled: true
    upload-guard:
      enabled: ${UPLOAD_GUARD_ENABLED:true}
      admin-image:
        daily-count-limit: ${UPLOAD_GUARD_ADMIN_DAILY_COUNT:500}
        daily-bytes-limit: ${UPLOAD_GUARD_ADMIN_DAILY_BYTES:2147483648}
      portal-image:
        daily-count-limit: ${UPLOAD_GUARD_PORTAL_DAILY_COUNT:120}
        daily-bytes-limit: ${UPLOAD_GUARD_PORTAL_DAILY_BYTES:536870912}
      avatar-image:
        daily-count-limit: ${UPLOAD_GUARD_AVATAR_DAILY_COUNT:20}
        daily-bytes-limit: ${UPLOAD_GUARD_AVATAR_DAILY_BYTES:104857600}
      direct-sign:
        daily-count-limit: ${UPLOAD_GUARD_SIGN_DAILY_COUNT:800}
        daily-bytes-limit: 0
      ip-daily:
        daily-count-limit: ${UPLOAD_GUARD_IP_DAILY_COUNT:600}
        daily-bytes-limit: ${UPLOAD_GUARD_IP_DAILY_BYTES:2147483648}
      global-daily:
        daily-count-limit: ${UPLOAD_GUARD_GLOBAL_DAILY_COUNT:8000}
        daily-bytes-limit: ${UPLOAD_GUARD_GLOBAL_DAILY_BYTES:32212254720}
      global-monthly:
        daily-count-limit: ${UPLOAD_GUARD_GLOBAL_MONTHLY_COUNT:200000}
        daily-bytes-limit: ${UPLOAD_GUARD_GLOBAL_MONTHLY_BYTES:536870912000}
    sensitive-words:
      location: ${SENSITIVE_WORDS_LOCATION:classpath:sensitive/sensi_words.txt}
    attack-alert:
      enabled: true
      interval-ms: 300000
      initial-delay-ms: 60000
      window-minutes: 5
      total-failed-threshold: 60
      per-ip-threshold: 12
      top-ip-limit: 5
      suppress-minutes: 10
      max-alerts-per-hour: 6
      slow-query-warn-ms: 500
      adaptive-threshold-enabled: true
      adaptive-threshold-alpha: 0.25
      adaptive-threshold-multiplier: 2.2
      adaptive-threshold-min: 60
    log-cleanup:
      enabled: true
      cron: "0 30 4 * * ?"
      login-log-retention-days: 90
      audit-log-retention-days: 90
      archive-enabled: true
      archive-batch-size: 20000
    data-governance:
      enabled: true
      cron: "0 40 4 * * ?"
      user-view-log-retention-days: 120
      post-ranking-retention-days: 180
      post-read-daily-retention-days: 365
      orphan-check-enabled: true
      collation-check-enabled: true
      collation-baseline: utf8mb4_0900_ai_ci
      notify-on-anomaly: false
      capacity:
        user-view-log-warn-rows: 5000000
        post-ranking-warn-rows: 500000
        login-log-warn-rows: 3000000
        audit-log-warn-rows: 3000000
