spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/weblog?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 3000ms
      timeout: 5000ms

server:
  tomcat:
    threads:
      max: 120
      min-spare: 10
    accept-count: 100
    max-connections: 1024
    connection-timeout: 5s

# 生产环境日志 - 输出到文件，级别 info
logging:
  level:
    root: info
    com.blog: info
    com.baomidou.mybatisplus: warn
  file:
    name: /var/log/weblog/application.log
    max-size: 100MB
    max-history: 7
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 生产环境关闭 Knife4j 文档
knife4j:
  enable: false

# 生产环境关闭 Sa-Token 日志
sa-token:
  is-log: false
  jwt-secret-key: ${JWT_SECRET}
  cookie:
    secure: true
    same-site: Strict
  refresh-cookie:
    secure: true
    same-site: Strict

# 生产环境验证码配置
captcha:
  secret-key: ${CAPTCHA_SECRET_KEY}

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# 生产环境 CORS
blog:
  async:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 100
    keep-alive-seconds: 60
  cors:
    allowed-origins: ${CORS_ORIGINS:https://yourdomain.com}
  # 密码加密配置 (RSA-PKCS1 + AES-GCM) - 生产环境必须配置
  crypto:
    rsa-private-key: ${RSA_PRIVATE_KEY:}
    secret: ${CRYPTO_SECRET:}
