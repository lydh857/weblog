spring:
  datasource:
    url: jdbc:mysql://localhost:3307/weblog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    hikari:
      # 连接池优化配置
      maximum-pool-size: 10  # 2C2G 机器建议上限
      minimum-idle: 2  # 降低空闲连接占用
      idle-timeout: 300000  # 空闲超时 5 分钟
      max-lifetime: 1800000  # 连接最大生命周期 30 分钟
      connection-timeout: 20000  # 连接超时 20 秒（原 30 秒）
      connection-test-query: SELECT 1  # 连接测试查询
      pool-name: zhhhklHikariCP  # 连接池名称
      leak-detection-threshold: 60000  # 连接泄露检测 60 秒

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: true
    baseline-version: 2
    clean-disabled: true
    placeholder-replacement: false
    user: ${FLYWAY_USERNAME:${DB_USERNAME:}}
    password: ${FLYWAY_PASSWORD:${DB_PASSWORD:}}

# 开发环境日志
logging:
  level:
    com.blog: debug
    com.baomidou.mybatisplus: debug

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

blog:
  async:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 500
    keep-alive-seconds: 60
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001
  security:
    dev-bypass-enabled: false
    referer-enabled: true
    allowed-origins: http://localhost:3000,http://localhost:3001
    attack-alert:
      slow-query-warn-ms: 300
      adaptive-threshold-enabled: true
      adaptive-threshold-alpha: 0.3
      adaptive-threshold-multiplier: 2.0
      adaptive-threshold-min: 20
    log-cleanup:
      enabled: true
      cron: "0 30 4 * * ?"
      login-log-retention-days: 30
      audit-log-retention-days: 30
      archive-enabled: true
      archive-batch-size: 5000
    data-governance:
      enabled: true
      cron: "0 40 4 * * ?"
      user-view-log-retention-days: 30
      post-ranking-retention-days: 45
      post-read-daily-retention-days: 90
      orphan-check-enabled: true
      collation-check-enabled: true
      collation-baseline: utf8mb4_0900_ai_ci
      notify-on-anomaly: false
      capacity:
        user-view-log-warn-rows: 300000
        post-ranking-warn-rows: 100000
        login-log-warn-rows: 300000
        audit-log-warn-rows: 300000
  ai:
    enabled: false
    async:
      core-pool-size: 4
      max-pool-size: 8
      queue-capacity: 100
      keep-alive-seconds: 60
