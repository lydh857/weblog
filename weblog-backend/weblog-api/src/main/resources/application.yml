server:
  port: 9091
  servlet:
    context-path: /

spring:
  application:
    name: weblog-api

  # 完全禁用 Spring AI 自动配置
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiChatAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiImageAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiModerationAutoConfiguration

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  # 数据源公共配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true  # 启用二级缓存
    lazy-loading-enabled: false  # 懒加载
    aggressive-lazy-loading: false  # 积极懒加载
    default-statement-timeout: 30  # 默认超时时间（秒）
    default-fetch-size: 100  # 默认结果集大小
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# Sa-Token 配置（HttpOnly Cookie + Refresh Token）
sa-token:
  token-name: Satoken
  timeout: 1800
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
  jwt-secret-key: ${JWT_SECRET:}
  is-read-cookie: true
  is-read-header: false
  token-prefix: ""
  refresh-token:
    timeout: 604800
    is-auto-refresh: true
    is-singleton: false
  cookie:
    name: Satoken
    timeout: 1800
    path: /
    domain: ""
    http-only: true
    same-site: Lax
    secure: false
  refresh-cookie:
    name: Satoken-Refresh
    timeout: 604800
    path: /
    domain: ""
    http-only: true
    same-site: Lax
    secure: false

# Knife4j API 文档
knife4j:
  enable: true
  setting:
    language: zh_cn

# GitHub OAuth 配置
github:
  oauth:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}

# 存储后端：local | aliyun-oss | r2
storage:
  provider: ${STORAGE_PROVIDER:local}

# 阿里云 OSS（storage.provider=aliyun-oss 时生效）
oss:
  endpoint: ${OSS_ENDPOINT:}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET_NAME:}
  cdn-domain: ${OSS_CDN_DOMAIN:}
  sign-url-expire-seconds: ${OSS_SIGN_URL_EXPIRE_SECONDS:300}
  content-moderation-enabled: ${OSS_CONTENT_MODERATION_ENABLED:false}

# Cloudflare R2（storage.provider=r2 时生效）
r2:
  endpoint: ${R2_ENDPOINT:}
  access-key-id: ${R2_ACCESS_KEY_ID:}
  access-key-secret: ${R2_ACCESS_KEY_SECRET:}
  bucket-name: ${R2_BUCKET_NAME:}
  public-base-url: ${R2_PUBLIC_BASE_URL:}
  region: ${R2_REGION:auto}
  sign-url-expire-seconds: ${R2_SIGN_URL_EXPIRE_SECONDS:300}

# Lucene 全文检索
lucene:
  index-dir: ./lucene-index
  max-results: 100
  ram-buffer-size-mb: 64.0

# 业务配置
blog:
  ai:
    enabled: false
    provider: openai
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    model: ${AI_MODEL:gpt-4o-mini}
    async:
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 50
      keep-alive-seconds: 60
  # 安全配置
  security:
    # 仅开发/测试可开启本地限流与验证码绕过
    dev-bypass-enabled: false
    # HSTS（生产环境 HTTPS 时启用）
    hsts-enabled: ${HSTS_ENABLED:false}
    # 敏感操作二次验证
    sensitive-op-verify-enabled: true
    # 请求来源验证
    referer-enabled: ${REFERER_ENABLED:true}
    # 敏感词词库位置
    sensitive-words:
      location: ${SENSITIVE_WORDS_LOCATION:classpath:sensitive/sensi_words.txt}
    # 允许的来源（优先 ALLOWED_ORIGINS，未设置时回退 CORS_ORIGINS）
    allowed-origins: ${ALLOWED_ORIGINS:${CORS_ORIGINS:}}
    # 上传风控与成本护栏
    upload-guard:
      enabled: ${UPLOAD_GUARD_ENABLED:true}
      admin-image:
        daily-count-limit: ${UPLOAD_GUARD_ADMIN_DAILY_COUNT:500}
        daily-bytes-limit: ${UPLOAD_GUARD_ADMIN_DAILY_BYTES:2147483648}
      portal-image:
        daily-count-limit: ${UPLOAD_GUARD_PORTAL_DAILY_COUNT:120}
        daily-bytes-limit: ${UPLOAD_GUARD_PORTAL_DAILY_BYTES:536870912}
      avatar-image:
        daily-count-limit: ${UPLOAD_GUARD_AVATAR_DAILY_COUNT:20}
        daily-bytes-limit: ${UPLOAD_GUARD_AVATAR_DAILY_BYTES:104857600}
      direct-sign:
        daily-count-limit: ${UPLOAD_GUARD_SIGN_DAILY_COUNT:800}
        daily-bytes-limit: 0
      ip-daily:
        daily-count-limit: ${UPLOAD_GUARD_IP_DAILY_COUNT:600}
        daily-bytes-limit: ${UPLOAD_GUARD_IP_DAILY_BYTES:2147483648}
      global-daily:
        daily-count-limit: ${UPLOAD_GUARD_GLOBAL_DAILY_COUNT:8000}
        daily-bytes-limit: ${UPLOAD_GUARD_GLOBAL_DAILY_BYTES:32212254720}
      global-monthly:
        daily-count-limit: ${UPLOAD_GUARD_GLOBAL_MONTHLY_COUNT:200000}
        daily-bytes-limit: ${UPLOAD_GUARD_GLOBAL_MONTHLY_BYTES:536870912000}
    # 安全日志自动清理（登录日志/审计日志）
    log-cleanup:
      enabled: true
      cron: "0 30 4 * * ?"
      login-log-retention-days: 180
      audit-log-retention-days: 180
      archive-enabled: true
      archive-batch-size: 20000
    attack-alert:
      slow-query-warn-ms: 500
      adaptive-threshold-enabled: true
      adaptive-threshold-alpha: 0.25
      adaptive-threshold-multiplier: 2.2
      adaptive-threshold-min: 60
    data-governance:
      enabled: true
      cron: "0 40 4 * * ?"
      user-view-log-retention-days: 180
      post-ranking-retention-days: 180
      post-read-daily-retention-days: 365
      orphan-check-enabled: true
      collation-check-enabled: true
      collation-baseline: utf8mb4_0900_ai_ci
      notify-on-anomaly: false
      capacity:
        user-view-log-warn-rows: 5000000
        post-ranking-warn-rows: 500000
        login-log-warn-rows: 3000000
        audit-log-warn-rows: 3000000
  # 文件上传配置
  upload:
    # 最大文件大小（MB）
    max-file-size: 5
    # 最大请求大小（MB）
    max-request-size: 10
    # 允许的图片类型
    allowed-image-types: jpg,jpeg,png,gif,webp,bmp

# 滑块验证码配置
captcha:
  secret-key: ${CAPTCHA_SECRET_KEY:}
  verify-token-expire-seconds: ${CAPTCHA_VERIFY_TOKEN_EXPIRE_SECONDS:120}
