server:
  port: 9091
  servlet:
    context-path: /

spring:
  application:
    name: weblog-api
  profiles:
    active: dev

  # 完全禁用 Spring AI 自动配置
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiChatAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiImageAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiModerationAutoConfiguration

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  # 数据源公共配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true  # 启用二级缓存
    lazy-loading-enabled: false  # 懒加载
    aggressive-lazy-loading: false  # 积极懒加载
    default-statement-timeout: 30  # 默认超时时间（秒）
    default-fetch-size: 100  # 默认结果集大小
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# Sa-Token 配置（HttpOnly Cookie + Refresh Token）
sa-token:
  token-name: Satoken
  timeout: 1800
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
  jwt-secret-key: ${JWT_SECRET:dev-jwt-secret-key-change-in-production}
  is-read-cookie: true
  is-read-header: false
  token-prefix: ""
  refresh-token:
    timeout: 604800
    is-auto-refresh: true
    is-singleton: false
  cookie:
    name: Satoken
    timeout: 1800
    path: /
    domain: ""
    http-only: true
    same-site: Lax
    secure: false
  refresh-cookie:
    name: Satoken-Refresh
    timeout: 604800
    path: /
    domain: ""
    http-only: true
    same-site: Lax
    secure: false

# Knife4j API 文档
knife4j:
  enable: true
  setting:
    language: zh_cn

# GitHub OAuth 配置
github:
  oauth:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}

# Lucene 全文检索
lucene:
  index-dir: ./lucene-index
  max-results: 100
  ram-buffer-size-mb: 64.0

# 业务配置
blog:
  ai:
    enabled: false
    provider: openai
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    model: ${AI_MODEL:gpt-4o-mini}
    embedding-model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
  # 安全配置
  security:
    # HSTS（生产环境 HTTPS 时启用）
    hsts-enabled: ${HSTS_ENABLED:false}
    # 敏感操作二次验证
    sensitive-op-verify-enabled: true
    # 请求来源验证
    referer-enabled: ${REFERER_ENABLED:true}
    # 允许的来源（优先 ALLOWED_ORIGINS，未设置时回退 CORS_ORIGINS）
    allowed-origins: ${ALLOWED_ORIGINS:${CORS_ORIGINS:}}
  # 文件上传配置
  upload:
    # 最大文件大小（MB）
    max-file-size: 5
    # 最大请求大小（MB）
    max-request-size: 10
    # 允许的图片类型
    allowed-image-types: jpg,jpeg,png,gif,webp,bmp

# 滑块验证码配置
captcha:
  secret-key: ${CAPTCHA_SECRET_KEY:dev-captcha-secret-change-in-production}
